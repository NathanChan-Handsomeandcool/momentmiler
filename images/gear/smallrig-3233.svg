<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- SmallRig 3233 — camera cage with rounded rectangular frame -->
  <g transform="translate(20,20)">
    <!-- Outer cage frame -->
    <rect x="60" y="50" width="240" height="170" rx="6"/>
    <!-- Inner camera silhouette -->
    <rect x="90" y="90" width="180" height="120" rx="4" opacity="0.4"/>
    <!-- Camera lens inside -->
    <circle cx="180" cy="150" r="36" opacity="0.5"/>
    <circle cx="180" cy="150" r="28" opacity="0.5"/>
    <!-- Top handle -->
    <path d="M150 50 v-14 a4 4 0 0 1 4 -4 h52 a4 4 0 0 1 4 4 v14"/>
    <!-- Cold shoe mounts on top -->
    <rect x="80" y="45" width="14" height="6" rx="1"/>
    <rect x="266" y="45" width="14" height="6" rx="1"/>
    <!-- Threaded mounting holes (¼"-20) on cage -->
    <circle cx="74" cy="74" r="2.5"/>
    <circle cx="74" cy="94" r="2.5"/>
    <circle cx="74" cy="114" r="2.5"/>
    <circle cx="74" cy="200" r="2.5"/>
    <circle cx="286" cy="74" r="2.5"/>
    <circle cx="286" cy="94" r="2.5"/>
    <circle cx="286" cy="114" r="2.5"/>
    <circle cx="286" cy="200" r="2.5"/>
    <!-- ARRI locating pin holes -->
    <circle cx="74" cy="84" r="1" fill="currentColor" stroke="none" opacity="0.6"/>
    <circle cx="286" cy="84" r="1" fill="currentColor" stroke="none" opacity="0.6"/>
  </g>
  <text x="200" y="265" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="300" letter-spacing="2" fill="currentColor" opacity="0.5" stroke="none">SMALLRIG 3233</text>
</svg>

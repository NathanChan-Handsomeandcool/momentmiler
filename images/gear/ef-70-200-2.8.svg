<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- EF 70-200 f/2.8 II — telephoto, long, with tripod collar -->
  <g transform="translate(0,30)">
    <!-- Cylindrical lens hood (telephoto style) -->
    <path d="M30 95 h28 v60 h-28 z"/>
    <!-- Front section -->
    <path d="M58 78 h70 v94 h-70 z"/>
    <ellipse cx="78" cy="125" rx="12" ry="38" opacity="0.3" fill="currentColor" stroke="none"/>
    <ellipse cx="78" cy="125" rx="10" ry="34"/>
    <!-- Focus ring -->
    <rect x="128" y="80" width="56" height="90"/>
    <rect x="134" y="92" width="42" height="6" rx="1" opacity="0.4"/>
    <!-- Zoom ring -->
    <rect x="184" y="80" width="60" height="90"/>
    <line x1="190" y1="170" x2="238" y2="170" opacity="0.4"/>
    <!-- Tripod collar (signature 70-200 feature) -->
    <rect x="206" y="172" width="22" height="18" rx="2"/>
    <rect x="210" y="190" width="14" height="6" rx="1"/>
    <!-- Switches -->
    <rect x="246" y="98" width="14" height="4" rx="1"/>
    <rect x="246" y="106" width="14" height="4" rx="1"/>
    <rect x="246" y="114" width="14" height="4" rx="1"/>
    <!-- Body to mount -->
    <path d="M260 95 L295 105 v40 L260 155 z"/>
    <!-- Mount -->
    <path d="M295 100 h14 v50 h-14 z"/>
    <rect x="309" y="115" width="4" height="20"/>
    <!-- Red ring (L-series) -->
    <rect x="262" y="118" width="2" height="14" fill="currentColor" stroke="none"/>
  </g>
  <text x="200" y="265" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="300" letter-spacing="2" fill="currentColor" opacity="0.5" stroke="none">EF 70-200mm f/2.8 II</text>
</svg>

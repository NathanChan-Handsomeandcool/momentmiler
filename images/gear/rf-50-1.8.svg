<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- RF 50mm f/1.8 — the "nifty fifty", very compact pancake-ish -->
  <g transform="translate(20,40)">
    <!-- Front element ring -->
    <path d="M80 80 h70 v60 h-70 z"/>
    <!-- Focus ring -->
    <rect x="150" y="80" width="50" height="60"/>
    <!-- Tapered body to mount -->
    <path d="M200 88 L240 100 v20 L200 132 z"/>
    <!-- Mount -->
    <path d="M240 95 h14 v30 h-14 z"/>
    <rect x="254" y="103" width="4" height="14"/>
    <!-- Front glass -->
    <ellipse cx="100" cy="110" rx="14" ry="26" opacity="0.3" fill="currentColor" stroke="none"/>
    <ellipse cx="100" cy="110" rx="12" ry="22"/>
    <!-- Switch -->
    <rect x="162" y="95" width="14" height="4" rx="1"/>
  </g>
  <text x="200" y="265" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="300" letter-spacing="2" fill="currentColor" opacity="0.5" stroke="none">RF 50mm f/1.8</text>
</svg>

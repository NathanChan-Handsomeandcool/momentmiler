<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Hilight NB-34 — 34mm ball head with quick-release plate -->
  <g transform="translate(0,10)">
    <!-- Tripod attachment base (bottom) -->
    <rect x="170" y="225" width="60" height="14" rx="2"/>
    <!-- ¼"-20 socket on bottom -->
    <circle cx="200" cy="244" r="3"/>

    <!-- Body / stem -->
    <path d="M178 195 h44 v30 h-44 z"/>

    <!-- Tension knobs (left & right) -->
    <circle cx="160" cy="210" r="11"/>
    <line x1="153" y1="210" x2="167" y2="210" opacity="0.4"/>
    <line x1="160" y1="203" x2="160" y2="217" opacity="0.4"/>
    <circle cx="240" cy="210" r="9"/>
    <line x1="234" y1="210" x2="246" y2="210" opacity="0.4"/>

    <!-- Pan lock at bottom -->
    <circle cx="200" cy="232" r="6" opacity="0.6"/>

    <!-- Ball housing (where the ball sits) -->
    <path d="M170 145 q0 -30 30 -30 q30 0 30 30 v50 h-60 z"/>

    <!-- Ball itself (34mm — large) -->
    <circle cx="200" cy="135" r="28"/>
    <!-- Ball highlight -->
    <ellipse cx="190" cy="125" rx="8" ry="5" opacity="0.3" fill="currentColor" stroke="none"/>

    <!-- Stem rising from ball -->
    <rect x="194" y="80" width="12" height="32"/>

    <!-- Quick-release clamp -->
    <path d="M150 60 h100 v22 h-100 z"/>
    <!-- Clamp jaws -->
    <line x1="150" y1="65" x2="250" y2="65" opacity="0.4"/>
    <line x1="150" y1="77" x2="250" y2="77" opacity="0.4"/>
    <!-- Clamp lock knob -->
    <circle cx="262" cy="71" r="8"/>
    <line x1="256" y1="71" x2="268" y2="71" opacity="0.4"/>

    <!-- Bubble level -->
    <circle cx="138" cy="71" r="4"/>
    <circle cx="138" cy="71" r="1.5" fill="currentColor" stroke="none" opacity="0.4"/>
  </g>
  <text x="200" y="275" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="300" letter-spacing="2" fill="currentColor" opacity="0.5" stroke="none">HILIGHT NB-34</text>
</svg>

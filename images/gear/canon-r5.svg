<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Mirrorless body — slimmer than DSLR, smaller pentaprism -->
  <path d="M70 130 h120 a8 8 0 0 1 8 -8 h60 a8 8 0 0 1 8 8 h70 a12 12 0 0 1 12 12 v75 a12 12 0 0 1 -12 12 h-260 a12 12 0 0 1 -12 -12 v-75 a12 12 0 0 1 12 -12 z"/>

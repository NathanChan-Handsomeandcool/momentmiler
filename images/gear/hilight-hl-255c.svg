<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Hilight HL-255C — carbon fiber tripod, 3 legs splayed -->
  <g transform="translate(0,10)">
    <!-- Center column with top platform -->
    <rect x="190" y="60" width="20" height="22" rx="2"/>
    <!-- Platform top (where ball head mounts) -->
    <path d="M170 60 h60 v6 h-60 z"/>
    <!-- ¼"-20 stud on platform -->
    <rect x="196" y="56" width="8" height="6" rx="1"/>
    <!-- Apex / spider (where legs join) -->
    <path d="M175 82 h50 v8 h-50 z"/>
    <circle cx="200" cy="86" r="3" fill="currentColor" stroke="none" opacity="0.5"/>
    <!-- Center column extension visible below apex -->
    <rect x="194" y="90" width="12" height="50"/>
    <!-- Hook at bottom of center column -->
    <path d="M200 140 q0 8 -6 8 q-6 0 -6 -6"/>

    <!-- Leg 1 (left, splayed outward) — 3 sections -->
    <path d="M175 86 L120 150"/>
    <path d="M120 150 L80 220"/>
    <path d="M80 220 L70 246"/>
    <!-- Foot 1 -->
    <ellipse cx="68" cy="248" rx="6" ry="3"/>
    <!-- Leg locks (twist locks) -->
    <circle cx="120" cy="150" r="3.5"/>
    <circle cx="80" cy="220" r="3.5"/>

    <!-- Leg 2 (center, straight down) — 3 sections -->
    <path d="M200 90 L200 160" opacity="0.4"/>
    <path d="M200 160 L200 220" opacity="0.4"/>
    <path d="M200 220 L200 248" opacity="0.4"/>
    <!-- Foot 2 -->
    <ellipse cx="200" cy="252" rx="6" ry="3" opacity="0.4"/>

    <!-- Leg 3 (right, splayed) — 3 sections -->
    <path d="M225 86 L280 150"/>
    <path d="M280 150 L320 220"/>
    <path d="M320 220 L330 246"/>
    <!-- Foot 3 -->
    <ellipse cx="332" cy="248" rx="6" ry="3"/>
    <!-- Leg locks -->
    <circle cx="280" cy="150" r="3.5"/>
    <circle cx="320" cy="220" r="3.5"/>
  </g>
  <text x="200" y="275" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="300" letter-spacing="2" fill="currentColor" opacity="0.5" stroke="none">HILIGHT HL-255C</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- EF 16-35 f/2.8 II — wide angle zoom, wide front element, medium length -->
  <g transform="translate(0,30)">
    <!-- Petal lens hood (wide-angle style) -->
    <path d="M60 70 L80 80 v90 L60 180 z"/>
    <!-- Front element (large, bulbous for wide angle) -->
    <path d="M80 75 h70 v100 h-70 z"/>
    <ellipse cx="100" cy="125" rx="18" ry="42" opacity="0.3" fill="currentColor" stroke="none"/>
    <ellipse cx="100" cy="125" rx="16" ry="38"/>
    <!-- Zoom ring (wide) -->
    <rect x="150" y="80" width="60" height="90"/>
    <line x1="156" y1="170" x2="204" y2="170" opacity="0.4"/>
    <!-- Focus ring -->
    <rect x="210" y="85" width="50" height="80"/>
    <!-- Tapered body to mount -->
    <path d="M260 95 L295 105 v40 L260 155 z"/>
    <!-- Mount -->
    <path d="M295 100 h14 v50 h-14 z"/>
    <rect x="309" y="115" width="4" height="20"/>
    <!-- Switches (AF/MF) -->
    <rect x="220" y="100" width="14" height="4" rx="1"/>
    <rect x="220" y="108" width="14" height="4" rx="1"/>
    <!-- Red ring (L-series indicator) -->
    <rect x="262" y="118" width="2" height="14" fill="currentColor" stroke="none"/>
  </g>
  <text x="200" y="265" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="300" letter-spacing="2" fill="currentColor" opacity="0.5" stroke="none">EF 16-35mm f/2.8 II</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Short prime lens, slightly tapered toward mount -->
  <g transform="translate(0,30)">
    <!-- Lens hood -->
    <path d="M90 95 v40 h-6 v-40 z"/>
    <!-- Front element -->
    <path d="M96 80 h80 v70 h-80 z"/>
    <!-- Focus ring -->
    <rect x="176" y="80" width="60" height="70" />
    <!-- Aperture ring (RF-specific) -->
    <rect x="236" y="85" width="20" height="60"/>
    <!-- Lens body (tapered to mount) -->
    <path d="M256 90 L290 100 v30 L256 140 z"/>
    <!-- Mount -->
    <path d="M290 95 h14 v40 h-14 z"/>
    <!-- Mount tab -->
    <rect x="304" y="105" width="4" height="20"/>
    <!-- Front glass element -->
    <ellipse cx="116" cy="115" rx="16" ry="32" opacity="0.3" fill="currentColor" stroke="none"/>
    <ellipse cx="116" cy="115" rx="14" ry="28"/>
    <!-- Distance scale window -->
    <rect x="194" y="98" width="20" height="6" rx="1" opacity="0.4"/>
    <!-- Focus distance markings -->
    <line x1="180" y1="135" x2="232" y2="135" opacity="0.3"/>
  </g>
  <text x="200" y="265" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="300" letter-spacing="2" fill="currentColor" opacity="0.5" stroke="none">RF 35mm f/1.8</text>
</svg>
